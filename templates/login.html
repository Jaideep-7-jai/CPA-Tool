<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | CPA Tool</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="login-body">
  <div class="login-card">
    <div class="login-brand">
      <div class="login-logo">CPA</div>
      <div class="login-title">CPA Request Portal</div>
      <div class="login-sub">Sign in to create and manage suppression requests</div>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert {{ category }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="post">
      <div class="mb-3">
        <label class="login-label">Username</label>
        <div class="login-input-wrap">
          <span class="login-input-icon"><i class="bi bi-person"></i></span>
          <input type="text" name="username" class="login-input" required autocomplete="username" placeholder="Enter your username">
        </div>
      </div>
      <div class="mb-3">
        <label class="login-label">Password</label>
        <div class="login-input-wrap">
          <span class="login-input-icon"><i class="bi bi-lock"></i></span>
          <input type="password" name="password" class="login-input" required autocomplete="current-password" placeholder="Enter your password">
        </div>
      </div>
      <button type="submit" class="login-btn">Sign In <i class="bi bi-arrow-right ms-1"></i></button>
    </form>

    <div class="login-footer">CPA Tool &mdash; Request Management Portal</div>
  </div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
