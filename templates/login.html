<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | CPA Tool</title>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,600,700,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="login-body">
  <div class="login-glow"></div>

  <div class="login-card">
    <div class="login-brand">
      <div class="login-logo">CPA</div>
      <div class="login-title">CPA Request Portal</div>
      <div class="login-sub">Sign in to create and manage suppression requests</div>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert {{ category }}" style="margin-bottom:16px;">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="post">
      <div style="margin-bottom:16px;">
        <label class="login-label">Username</label>
        <div class="login-input-wrap">
          <span class="login-input-icon"><i class="bi bi-person-fill"></i></span>
          <input type="text" name="username" class="login-input" required autocomplete="username" placeholder="Enter your username">
        </div>
      </div>
      <div style="margin-bottom:20px;">
        <label class="login-label">Password</label>
        <div class="login-input-wrap">
          <span class="login-input-icon"><i class="bi bi-lock-fill"></i></span>
          <input type="password" name="password" id="passwordField" class="login-input" required autocomplete="current-password" placeholder="Enter your password">
          <button type="button" id="togglePwd" onclick="togglePassword()" style="position:absolute;right:12px;background:none;border:none;cursor:pointer;color:var(--muted);font-size:.95rem;">
            <i class="bi bi-eye" id="eyeIcon"></i>
          </button>
        </div>
      </div>
      <button type="submit" class="login-btn">Sign In &nbsp;<i class="bi bi-arrow-right-short"></i></button>
    </form>

    <div class="login-footer">CPA Tool &mdash; Request Management Portal</div>
  </div>

<script>
function togglePassword() {
  const f = document.getElementById('passwordField');
  const i = document.getElementById('eyeIcon');
  if (f.type === 'password') {
    f.type = 'text';
    i.className = 'bi bi-eye-slash';
  } else {
    f.type = 'password';
    i.className = 'bi bi-eye';
  }
}
</script>
</body>
</html>
