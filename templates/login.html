<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | CPA Tool</title>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500,700,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
    .auth-divider {
      display: flex; align-items: center; gap: 12px;
      margin: 4px 0; color: var(--text-faint); font-size: .78rem;
    }
    .auth-divider::before, .auth-divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }
    .auth-footer {
      text-align: center;
      margin-top: 20px;
      font-size: .78rem;
      color: var(--sidebar-muted);
    }
    .input-icon-wrap { position: relative; }
    .input-icon-wrap input { padding-left: 38px; width: 100%; }
    .input-icon {
      position: absolute; left: 12px; top: 50%;
      transform: translateY(-50%);
      font-size: .95rem;
      pointer-events: none;
      opacity: .55;
    }
    .label-row { display: flex; justify-content: space-between; align-items: center; }
    .label-row small { font-weight: 400; font-size: .75rem; color: var(--text-muted); }
  </style>
</head>
<body class="auth-body">
  <main class="auth-shell">
    <section class="auth-card">
      <div class="brand-block">
        <div class="brand-logo">
          <svg width="36" height="36" viewBox="0 0 40 40" fill="none" aria-label="CPA Tool">
            <text x="50%" y="56%" dominant-baseline="middle" text-anchor="middle"
              fill="white" font-size="15" font-weight="800" font-family="Satoshi,sans-serif">CPA</text>
          </svg>
        </div>
        <h1>CPA Request Portal</h1>
        <p>Sign in to create and manage suppression requests</p>
      </div>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="alert {{ category }}">{{ message }}</div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <form method="post" class="auth-form">
        <label>
          <span class="label-row">
            <span>Username</span>
          </span>
          <div class="input-icon-wrap">
            <span class="input-icon">👤</span>
            <input type="text" name="username" required autocomplete="username" placeholder="Enter your username" />
          </div>
        </label>
        <label>
          <span class="label-row">
            <span>Password</span>
          </span>
          <div class="input-icon-wrap">
            <span class="input-icon">🔒</span>
            <input type="password" name="password" required autocomplete="current-password" placeholder="Enter your password" />
          </div>
        </label>
        <button type="submit">Sign In →</button>
      </form>

      <div class="auth-footer">
        CPA Tool &mdash; Request Management Portal
      </div>
    </section>
  </main>
</body>
</html>
