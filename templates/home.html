<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home | CPA Request Portal</title>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="sidebar-top">
        <h2>Requests</h2>
        <p>All created requests</p>
      </div>
      <div id="requestList" class="request-list">
        {% for item in requests_data %}
        <article class="request-item">
          <div class="row-between">
            <strong>{{ item.criteria|upper }}</strong>
            <span class="badge {{ item.status }}">{{ item.status }}</span>
          </div>
          <div class="meta">Comp: {{ item.comp }}</div>
          <div class="meta">User: {{ item.username }}</div>
          <div class="meta">Output: {{ item.output_dir }}</div>
          <div class="meta">Created: {{ item.created_at }}</div>
        </article>
        {% endfor %}
      </div>
    </aside>
    <main class="main-panel">
      <header class="topbar">
        <div>
          <h1>Create request</h1>
          <p>Welcome, {{ username }}.</p>
        </div>
        <a href="{{ url_for('logout') }}" class="link-button">Logout</a>
      </header>
      <section class="card form-card">
        <form id="requestForm">
          <label>Criteria<select name="criteria" id="criteria" required><option value="age">Age</option><option value="state">State</option><option value="zip">ZIP</option></select></label>
          <label>Comparison<select name="comp" id="comp" required></select></label>
          <label id="ageWrap">Age<input type="number" name="age" id="age" min="1" /></label>
          <label id="stateWrap" class="hidden">States (comma separated)<input type="text" name="states" id="states" placeholder="AK, CA, TX" /></label>
          <label id="zipWrap" class="hidden">ZIP file<input type="file" name="zip_file" id="zip_file" accept=".csv,.txt" /></label>
          <label>Output directory<input type="text" name="output_dir" value="./output" /></label>
          <button type="submit">Submit request</button>
          <p id="formMessage" class="message"></p>
        </form>
      </section>
    </main>
  </div>
  <script src="{{ url_for('static', filename='app.js') }}" defer></script>
</body>
</html>
